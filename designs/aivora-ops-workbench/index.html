<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aivora · 运营工作台</title>
<style>
  :root {
    --bg: #0d0d11;
    --bg-raise: #121218;
    --surface: #17171f;
    --surface-2: #1d1d27;
    --line: rgba(255,255,255,.075);
    --line-strong: rgba(255,255,255,.14);
    --text: rgba(245,243,238,.92);
    --text-2: rgba(245,243,238,.60);
    --text-3: rgba(245,243,238,.38);
    --gold: #e2a63d;
    --gold-soft: rgba(226,166,61,.14);
    --gold-line: rgba(226,166,61,.35);
    --green: #6fbf8f;
    --green-soft: rgba(111,191,143,.12);
    --green-line: rgba(111,191,143,.4);
    --red: #d97e6a;
    --red-soft: rgba(217,126,106,.12);
    --blue: #7da7d9;
    --blue-soft: rgba(125,167,217,.12);
    --sans: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
    --serif: "Palatino", "Songti SC", "Noto Serif SC", Georgia, serif;
    --r-lg: 14px;
    --r-md: 10px;
    --r-sm: 7px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; }

  .shell { display: grid; grid-template-columns: 232px 1fr; height: 100vh; }

  /* ---------- sidebar ---------- */
  .side {
    background: var(--bg-raise);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    padding: 22px 14px 16px;
    gap: 4px;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; padding: 0 10px 20px; }
  .brand-name { font-family: var(--serif); font-size: 21px; letter-spacing: .04em; color: var(--text); }
  .brand-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 12px rgba(226,166,61,.8); align-self: center; }
  .brand-sub { font-size: 10.5px; color: var(--text-3); letter-spacing: .14em; text-transform: uppercase; }
  .nav-label { font-size: 10.5px; letter-spacing: .14em; color: var(--text-3); padding: 14px 10px 6px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    background: transparent; font-family: var(--sans);
    padding: 9px 10px; border-radius: var(--r-sm);
    color: var(--text-2); cursor: pointer; border: 1px solid transparent;
    transition: all .15s ease; font-size: 13.5px; user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .nav-item.active { color: var(--gold); background: var(--gold-soft); border-color: var(--gold-line); }
  .nav-item svg { width: 16px; height: 16px; flex: none; }
  .nav-item .nav-count {
    margin-left: auto; font-size: 10.5px; color: var(--text-3);
    border: 1px solid var(--line-strong); border-radius: 99px; padding: 0 7px;
  }
  .side-foot { margin-top: auto; padding: 12px 10px; border-top: 1px solid var(--line); }
  .side-foot .muted { font-size: 11px; color: var(--text-3); }

  /* ---------- main ---------- */
  .main { overflow-y: auto; }
  .page { max-width: 1120px; margin: 0 auto; padding: 34px 40px 80px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 26px; }
  .page-title { font-family: var(--serif); font-size: 26px; font-weight: 500; letter-spacing: .02em; }
  .page-desc { color: var(--text-2); font-size: 13px; margin-top: 3px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 20px 22px;
  }
  .card + .card { margin-top: 16px; }
  .card-title { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* client hero */
  .client-hero { display: flex; gap: 20px; align-items: center; }
  .client-logo { width: 62px; height: 62px; border-radius: 14px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; flex: none; }
  .client-logo img { width: 52px; height: 52px; object-fit: contain; }
  .client-name { font-family: var(--serif); font-size: 21px; }
  .client-meta { color: var(--text-2); font-size: 12.5px; display: flex; gap: 14px; margin-top: 4px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; padding: 3px 10px; border-radius: 99px;
    border: 1px solid var(--line-strong); color: var(--text-2);
  }
  .chip.gold { color: var(--gold); border-color: var(--gold-line); background: var(--gold-soft); }
  .chip.green { color: var(--green); border-color: var(--green-line); background: var(--green-soft); }

  /* locks */
  .lock-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .lock-row:last-child { border-bottom: none; }
  .lock-row svg { width: 15px; height: 15px; color: var(--gold); flex: none; margin-top: 4px; }
  .lock-name { font-size: 13.5px; }
  .lock-why { font-size: 12px; color: var(--text-3); }

  /* lanes */
  .lane { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .lane:last-child { border-bottom: none; }
  .lane .pts { font-family: var(--serif); color: var(--gold); }
  .lane .dim { color: var(--text-3); font-size: 12px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .dot.on { background: var(--green); box-shadow: 0 0 8px rgba(111,191,143,.7); }
  .dot.off { background: var(--text-3); }

  /* batch table */
  .batch-row { display: grid; grid-template-columns: 44px 1fr 120px 110px 90px; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .batch-row:last-child { border-bottom: none; }
  .batch-row .idx { font-family: var(--serif); color: var(--text-3); }
  .status { font-size: 11.5px; padding: 2px 9px; border-radius: 99px; display: inline-flex; width: fit-content; }
  .status.done { color: var(--green); background: var(--green-soft); }
  .status.run { color: var(--gold); background: var(--gold-soft); }
  .status.wait { color: var(--text-3); background: rgba(255,255,255,.04); }
  .status.fail { color: var(--red); background: var(--red-soft); }

  /* create */
  .tpl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .tpl {
    border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 14px 16px; cursor: pointer; transition: all .15s ease;
    background: var(--bg-raise);
  }
  .tpl:hover { border-color: var(--line-strong); }
  .tpl.sel { border-color: var(--gold-line); background: var(--gold-soft); }
  .tpl-name { font-size: 13.5px; }
  .tpl-sub { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
  .refs { display: flex; gap: 10px; }
  .refs img { width: 74px; height: 74px; border-radius: var(--r-sm); object-fit: cover; border: 1px solid var(--line-strong); }
  .ref-add {
    width: 74px; height: 74px; border-radius: var(--r-sm);
    border: 1px dashed var(--line-strong); color: var(--text-3);
    display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer;
  }
  .ref-add:hover { color: var(--gold); border-color: var(--gold-line); }

  .budget-line { font-size: 12px; color: var(--text-3); letter-spacing: .04em; }
  .budget-line b { font-family: var(--serif); font-size: 19px; color: var(--gold); font-weight: 500; letter-spacing: 0; margin: 0 2px; }

  /* library */
  .lib-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .vid-card { border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--line); background: var(--surface); transition: all .15s ease; }
  .vid-card:hover { border-color: var(--line-strong); transform: translateY(-2px); }
  .vid-card.new { animation: newPulse 1.5s ease 2; }
  @keyframes newPulse {
    0% { box-shadow: 0 0 0 0 rgba(226,166,61,.45); border-color: var(--gold-line); }
    100% { box-shadow: 0 0 0 14px rgba(226,166,61,0); }
  }
  .vid-shot { position: relative; aspect-ratio: 9/13; background: var(--surface-2); }
  .vid-shot img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .vid-dur { position: absolute; bottom: 8px; right: 8px; font-size: 11px; background: rgba(13,13,17,.8); padding: 1px 7px; border-radius: 5px; color: var(--text-2); }
  .vid-branded {
    position: absolute; top: 8px; left: 8px; font-size: 10.5px;
    background: rgba(13,13,17,.85); border: 1px solid var(--gold-line);
    color: var(--gold); padding: 1px 8px; border-radius: 99px;
  }
  .vid-body { padding: 12px 14px 14px; }
  .vid-name { font-size: 13px; }
  .vid-meta { font-size: 11.5px; color: var(--text-3); margin: 2px 0 10px; }
  .vid-actions { display: flex; gap: 8px; }
  .vid-actions .grow { flex: 1; }
  .lib-tabs { margin-bottom: 20px; }
  .lib-empty { color: var(--text-3); font-size: 13px; padding: 40px 0; text-align: center; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    font-size: 13px; padding: 8px 16px; border-radius: var(--r-sm);
    border: 1px solid var(--line-strong); background: transparent; color: var(--text);
    cursor: pointer; font-family: var(--sans); transition: all .15s ease;
  }
  .btn:hover { border-color: var(--gold-line); color: var(--gold); }
  .btn.primary { background: var(--gold); border-color: var(--gold); color: #17130a; font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); color: #17130a; }
  .btn.small { font-size: 12px; padding: 5px 12px; }
  .btn.block { width: 100%; }
  .btn:disabled { opacity: .45; cursor: default; }
  .btn:disabled:hover { border-color: var(--line-strong); color: var(--text); }
  .btn.primary:disabled:hover { color: #17130a; filter: none; }
  .link-btn {
    background: none; border: none; cursor: pointer; font-family: var(--sans);
    color: var(--blue); font-size: 12.5px; padding: 0;
  }
  .link-btn:hover { text-decoration: underline; }

  /* drawer */
  .drawer-mask { position: fixed; inset: 0; background: rgba(5,5,8,.6); backdrop-filter: blur(2px); z-index: 40; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 400px; z-index: 50;
    background: var(--bg-raise); border-left: 1px solid var(--line-strong);
    padding: 26px 26px 22px; overflow-y: auto;
    box-shadow: -30px 0 60px rgba(0,0,0,.45);
    animation: slideIn .22s ease;
  }
  @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: none; opacity: 1; } }
  .drawer h3 { font-family: var(--serif); font-size: 19px; font-weight: 500; }
  .drawer .sub { color: var(--text-3); font-size: 12px; margin: 4px 0 20px; }
  .seg { display: flex; border: 1px solid var(--line-strong); border-radius: var(--r-sm); overflow: hidden; margin-bottom: 18px; }
  .seg button {
    flex: 1; padding: 8px 0; background: transparent; border: none; cursor: pointer;
    color: var(--text-2); font-size: 12.5px; font-family: var(--sans);
  }
  .seg button.on { background: var(--gold-soft); color: var(--gold); }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--line); }
  .toggle-row .t-name { font-size: 13.5px; }
  .toggle-row .t-sub { font-size: 11.5px; color: var(--text-3); }
  .switch { width: 38px; height: 22px; border-radius: 99px; background: rgba(255,255,255,.12); position: relative; cursor: pointer; transition: background .18s; flex: none; }
  .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: transform .18s; }
  .switch.on { background: var(--gold); }
  .switch.on::after { transform: translateX(16px); }
  .field { margin-top: 14px; }
  .field label { font-size: 11.5px; color: var(--text-3); display: block; margin-bottom: 5px; letter-spacing: .05em; }
  .field input {
    width: 100%; background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: var(--r-sm); color: var(--text); padding: 8px 11px; font-size: 13px; font-family: var(--sans);
  }
  .field input:focus { outline: none; border-color: var(--gold-line); }

  .structure { display: flex; gap: 3px; margin: 18px 0 8px; height: 34px; }
  .structure > div { border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 10.5px; letter-spacing: .03em; }
  .structure.sm { height: 28px; margin: 12px 0 4px; max-width: 460px; }
  .st-main { flex: 8; background: var(--surface-2); color: var(--text-2); border: 1px solid var(--line-strong); }
  .st-trim { flex: 1.1; background: var(--red-soft); color: var(--red); border: 1px dashed rgba(217,126,106,.5); }
  .st-end { flex: 2.2; background: var(--gold-soft); color: var(--gold); border: 1px solid var(--gold-line); }
  .st-note { font-size: 11px; color: var(--text-3); margin-bottom: 16px; }

  .endcard-preview { display: flex; gap: 12px; align-items: center; margin: 14px 0 4px; }
  .endcard-preview img { width: 74px; border-radius: var(--r-sm); border: 1px solid var(--line-strong); }
  .endcard-preview .ec-lines { font-size: 11.5px; color: var(--text-2); line-height: 1.75; }
  .endcard-preview .ec-lines b { color: var(--text); font-weight: 600; }

  /* ---------- topbar ---------- */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 40px; border-bottom: 1px solid var(--line);
    background: rgba(13,13,17,.75); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 30;
  }
  .top-chip {
    font-size: 11.5px; color: var(--text-2);
    border: 1px solid var(--line-strong); border-radius: 99px; padding: 2px 12px;
  }
  .topbar .ver { font-size: 11px; color: var(--text-3); letter-spacing: .08em; }
  .topbar .spacer { flex: 1; }
  .bal-wrap { position: relative; }
  .top-balance {
    display: flex; align-items: baseline; gap: 6px; position: relative;
    border: 1px solid var(--gold-line); background: var(--gold-soft);
    padding: 4px 14px; border-radius: 99px; cursor: pointer; font-family: var(--sans);
  }
  .top-balance:hover { border-color: var(--gold); }
  .top-balance b { font-family: var(--serif); font-size: 15px; color: var(--gold); font-weight: 500; }
  .top-balance span { font-size: 10.5px; color: var(--text-3); }
  .bal-delta {
    position: absolute; right: 8px; top: -16px;
    font-family: var(--serif); font-size: 12px; color: var(--red);
    animation: deltaFloat 2.4s ease forwards; pointer-events: none;
  }
  @keyframes deltaFloat {
    0% { opacity: 0; transform: translateY(6px); }
    18% { opacity: 1; transform: none; }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-8px); }
  }
  .pop-mask { position: fixed; inset: 0; z-index: 34; }
  .bal-pop {
    position: absolute; right: 0; top: calc(100% + 10px); width: 280px; z-index: 35;
    background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: var(--r-md);
    padding: 14px 16px; box-shadow: 0 20px 50px rgba(0,0,0,.55);
    animation: obIn .18s ease;
  }
  .bp-row { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; padding: 7px 0; border-bottom: 1px solid var(--line); }
  .bp-row.head { color: var(--text-2); font-size: 12px; letter-spacing: .06em; }
  .bp-row .pts { font-family: var(--serif); color: var(--gold); }
  .bp-row .dim { color: var(--text-3); font-size: 11px; }
  .bp-foot { font-size: 11px; color: var(--text-3); padding-top: 9px; }
  .top-help {
    width: 26px; height: 26px; border-radius: 50%; flex: none;
    border: 1px solid var(--line-strong); background: transparent; color: var(--text-2);
    font-size: 13px; cursor: pointer; font-family: var(--sans);
    display: flex; align-items: center; justify-content: center; transition: all .15s ease;
  }
  .top-help:hover { color: var(--blue); border-color: rgba(125,167,217,.5); }
  .top-user { display: flex; align-items: center; gap: 9px; padding-left: 4px; }
  .ready { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); }
  .ready i { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px rgba(111,191,143,.8); }
  .top-user .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #a8742a);
    color: #17130a; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .top-user .u-name { font-size: 12.5px; line-height: 1.3; }
  .top-user .u-mail { font-size: 10.5px; color: var(--text-3); line-height: 1.3; }

  /* ---------- onboarding modal ---------- */
  .ob-mask {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(5,5,8,.72); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  .ob {
    width: 560px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
    background: var(--bg-raise); border: 1px solid var(--line-strong); border-radius: 18px;
    padding: 30px 32px 24px; box-shadow: 0 30px 90px rgba(0,0,0,.65);
    animation: obIn .25s ease;
  }
  @keyframes obIn { from { transform: translateY(14px); opacity: 0; } to { transform: none; opacity: 1; } }
  .ob-badge {
    display: inline-flex; font-size: 11px; color: var(--gold);
    border: 1px solid var(--gold-line); background: var(--gold-soft);
    padding: 2px 10px; border-radius: 99px; letter-spacing: .08em;
  }
  .ob h2 { font-family: var(--serif); font-size: 22px; font-weight: 500; margin: 14px 0 4px; }
  .ob-sub { font-size: 13px; color: var(--text-2); margin-bottom: 18px; }
  .ob-step {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--r-md);
    background: var(--surface); margin-bottom: 10px;
  }
  .ob-step .n {
    width: 22px; height: 22px; border-radius: 50%; flex: none; margin-top: 1px;
    border: 1px solid var(--gold-line); color: var(--gold);
    font-family: var(--serif); font-size: 12.5px;
    display: flex; align-items: center; justify-content: center;
  }
  .ob-step .t { font-size: 13.5px; }
  .ob-step .s { font-size: 12px; color: var(--text-3); }
  .ob-note {
    font-size: 12px; color: var(--text-2); line-height: 1.7;
    background: var(--blue-soft); border: 1px solid rgba(125,167,217,.3);
    border-radius: var(--r-sm); padding: 9px 12px; margin-top: 4px;
  }
  .ob-note b { color: var(--blue); font-weight: 600; }
  .ob-foot { display: flex; align-items: center; gap: 10px; margin-top: 18px; }
  .ob-foot .spacer { flex: 1; }
  .ob-check { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-2); cursor: pointer; user-select: none; }
  .ob-check .cb {
    width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--line-strong);
    color: transparent; font-size: 11px; display: flex; align-items: center; justify-content: center;
    transition: all .15s ease;
  }
  .ob-check .cb.on { background: var(--gold); border-color: var(--gold); color: #17130a; }

  /* ---------- guide banner ---------- */
  .guide {
    display: flex; align-items: center; gap: 12px;
    border: 1px solid rgba(125,167,217,.35);
    background: var(--blue-soft); border-radius: var(--r-md);
    padding: 11px 16px; margin-bottom: 16px; font-size: 13px;
  }
  .guide .g-badge {
    width: 20px; height: 20px; border-radius: 50%; flex: none;
    background: var(--blue); color: #0d0d11; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .guide .g-text { flex: 1; color: var(--text-2); }
  .guide .g-text b { color: var(--text); font-weight: 600; }
  .guide .g-btns { display: flex; gap: 14px; flex: none; }
  .guide button { background: none; border: none; color: var(--blue); font-size: 12.5px; cursor: pointer; font-family: var(--sans); }

  /* ---------- create stepper ---------- */
  .stepper {
    display: flex; margin-bottom: 20px;
    border: 1px solid var(--line-strong); border-radius: 99px; overflow: hidden;
    background: var(--surface);
  }
  .stp {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 0; font-size: 12.5px; color: var(--text-3);
    background: transparent; border: none; cursor: pointer; font-family: var(--sans);
    border-right: 1px solid var(--line); transition: all .15s ease;
  }
  .stp:last-child { border-right: none; }
  .stp:hover { color: var(--text-2); }
  .stp .stp-n {
    width: 18px; height: 18px; border-radius: 50%; flex: none;
    border: 1px solid var(--line-strong); font-family: var(--serif); font-size: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .stp.active { color: var(--gold); background: var(--gold-soft); }
  .stp.active .stp-n { border-color: var(--gold-line); color: var(--gold); }
  .stp.done { color: var(--green); }
  .stp.done .stp-n { border-color: var(--green-line); color: var(--green); }

  /* ---------- numbered steps ---------- */
  .step-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%; flex: none;
    border: 1px solid var(--gold-line); color: var(--gold);
    font-family: var(--serif); font-size: 12.5px;
    display: flex; align-items: center; justify-content: center;
  }
  .card.step-done .step-num { border-color: var(--green-line); color: var(--green); }
  .step-name { font-size: 14px; }
  .step-req { font-size: 11px; color: var(--text-3); }
  .step-done-mark { margin-left: auto; color: var(--green); font-size: 12px; }

  .refs .pick { position: relative; cursor: pointer; border-radius: var(--r-sm); }
  .refs .pick img { display: block; }
  .refs .pick.sel img { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-line); }
  .refs .pick .tick {
    position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); color: #17130a; font-size: 11px; font-weight: 700;
    display: none; align-items: center; justify-content: center;
  }
  .refs .pick.sel .tick { display: flex; }

  .kind-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .kind-tab {
    padding: 7px 18px; border-radius: 99px; font-size: 13px; cursor: pointer;
    border: 1px solid var(--line-strong); color: var(--text-2); background: transparent; font-family: var(--sans);
  }
  .kind-tab.on { border-color: var(--gold-line); background: var(--gold-soft); color: var(--gold); }

  .count-step { display: inline-flex; align-items: center; gap: 14px; }
  .count-step button {
    width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--line-strong);
    background: transparent; color: var(--text); cursor: pointer; font-size: 15px; font-family: var(--sans);
  }
  .count-step b { font-family: var(--serif); font-size: 17px; min-width: 20px; text-align: center; }

  .lane-strip {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
    font-size: 12px; color: var(--text-2);
  }
  .lane-strip svg { width: 13px; height: 13px; color: var(--green); vertical-align: -2px; margin-right: 4px; }

  /* ---------- submit bar + queue ---------- */
  .submit-bar {
    position: sticky; bottom: 0; margin-top: 16px;
    background: rgba(13,13,17,.9); backdrop-filter: blur(10px);
    border: 1px solid var(--line-strong); border-radius: var(--r-lg);
    padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; gap: 20px;
    box-shadow: 0 -12px 40px rgba(0,0,0,.4);
  }
  .sb-left { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .sb-right { display: flex; align-items: center; gap: 10px; flex: none; }
  .submit-hint { font-size: 12px; color: var(--text-3); }
  .queue-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .q-chip {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; padding: 3px 11px; border-radius: 99px;
    border: 1px solid var(--gold-line); background: var(--gold-soft); color: var(--text);
  }
  .q-chip .fam { color: var(--gold); font-size: 11px; }
  .q-chip .x { cursor: pointer; color: var(--text-3); font-size: 11px; }
  .q-chip .x:hover { color: var(--red); }
  .q-chip.cur { border-style: dashed; background: transparent; }

  /* ---------- generation progress ---------- */
  .gen-mask { position: fixed; inset: 0; background: rgba(5,5,8,.72); backdrop-filter: blur(4px); z-index: 70; display: flex; align-items: center; justify-content: center; }
  .gen-panel {
    width: 740px; max-height: 86vh; overflow-y: auto;
    background: var(--bg-raise); border: 1px solid var(--line-strong); border-radius: 18px;
    padding: 26px 30px 22px; box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .gen-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
  .gen-panel h3 { font-family: var(--serif); font-size: 20px; font-weight: 500; }
  .gen-panel .g-sub { color: var(--text-3); font-size: 12.5px; margin-top: 4px; }
  .gen-item { border: 1px solid var(--line); border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 12px; background: var(--surface); }
  .gi-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 13px; margin-bottom: 10px; }
  .gi-fam {
    display: inline-flex; font-size: 10.5px; color: var(--gold);
    border: 1px solid var(--gold-line); border-radius: 99px; padding: 0 7px; margin-right: 8px;
  }
  .gi-track { display: flex; align-items: center; gap: 5px; flex: none; }
  .gi-track .tk {
    font-size: 10.5px; padding: 1px 8px; border-radius: 99px;
    border: 1px solid var(--line); color: var(--text-3);
  }
  .gi-track .tk.on { border-color: var(--gold-line); color: var(--gold); background: var(--gold-soft); }
  .gi-track .tk.done { border-color: transparent; color: var(--green); }
  .gi-track .tk.fin { border-color: var(--green-line); color: var(--green); background: var(--green-soft); }
  .gen-frames { display: flex; gap: 7px; }
  .gen-frames .gf {
    flex: 1; aspect-ratio: 9/14; border-radius: 6px; overflow: hidden; position: relative;
    background: var(--surface-2); border: 1px solid var(--line);
  }
  .gen-frames .gf img { width: 100%; height: 100%; object-fit: cover; display: block; animation: fadeIn .4s ease; }
  .gf .gf-score {
    position: absolute; top: 4px; right: 4px; font-family: var(--serif); font-size: 10px;
    background: rgba(13,13,17,.85); color: var(--gold); padding: 0 6px; border-radius: 99px; border: 1px solid var(--gold-line);
  }
  .gf .gf-idle {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 10.5px; color: var(--text-3);
  }
  .gf .roll { position: absolute; inset: 0; }
  .gf .roll img {
    position: absolute; inset: 0; opacity: 0; animation: gfRoll .88s steps(1, end) infinite;
  }
  @keyframes gfRoll { 0% { opacity: 1; } 25% { opacity: 0; } 100% { opacity: 0; } }
  .gf .roll-tag {
    position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); white-space: nowrap;
    font-size: 9.5px; color: var(--gold); background: rgba(13,13,17,.85);
    border: 1px solid var(--gold-line); border-radius: 99px; padding: 0 7px; z-index: 2;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .gi-judge { font-size: 11.5px; color: var(--text-2); margin-top: 9px; }
  .gi-judge.ok { color: var(--green); }
  .gen-bar { height: 5px; border-radius: 99px; background: rgba(255,255,255,.07); margin-top: 9px; overflow: hidden; }
  .gen-bar > div { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c063); border-radius: 99px; transition: width .4s ease; }

  .gen-pill {
    position: fixed; bottom: 26px; right: 26px; z-index: 65;
    display: flex; align-items: center; gap: 10px;
    background: var(--surface-2); border: 1px solid var(--gold-line); border-radius: 99px;
    color: var(--text); font-size: 13px; font-family: var(--sans);
    padding: 10px 20px; cursor: pointer; box-shadow: 0 14px 40px rgba(0,0,0,.5);
    animation: slideUp .25s ease;
  }
  .gen-pill:hover { border-color: var(--gold); }
  .gen-pill .dim { color: var(--text-3); font-size: 11.5px; }
  .gen-pill .spin {
    width: 13px; height: 13px; border-radius: 50%; flex: none;
    border: 2px solid var(--gold-soft); border-top-color: var(--gold);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--gold-line);
    color: var(--text); font-size: 13px; padding: 10px 20px; border-radius: 99px;
    z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,.5);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translate(-50%, 12px); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }
  .toast .gold { color: var(--gold); }
</style>
</head>
